name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: voicr-linux-x86_64

          - os: macos-14
            target: aarch64-apple-darwin
            artifact: voicr-macos-arm64

          - os: macos-15
            target: x86_64-apple-darwin
            artifact: voicr-macos-x86_64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: voicr-windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      # Linux: ALSA (cpal) + XTest (rdev global hotkey)
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libxtst-dev libevdev-dev pkg-config

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # Rename the binary to the artifact name
      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/voicr ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/voicr.exe ${{ matrix.artifact }}.exe

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.exe

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "voicr ${{ github.ref_name }}"
          body_path: CHANGELOG.md
          files: |
            artifacts/voicr-linux-x86_64/voicr-linux-x86_64
            artifacts/voicr-macos-arm64/voicr-macos-arm64
            artifacts/voicr-macos-x86_64/voicr-macos-x86_64
            artifacts/voicr-windows-x86_64/voicr-windows-x86_64.exe
          draft: false
          prerelease: false
